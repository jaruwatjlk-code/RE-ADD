<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loss Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A1A2E;--ink2:#4A4A68;--ink3:#9090A8;
  --blue:#2563EB;--blue-lt:#EFF6FF;--blue-md:#BFDBFE;
  --line:#E5E7EB;--line2:#F3F4F6;--bg:#F8FAFC;--white:#FFFFFF;
  --red:#DC2626;--red-lt:#FEF2F2;
  --green:#16A34A;--green-lt:#F0FDF4;
  --amber:#D97706;--amber-lt:#FFFBEB;
  --s1:0 1px 3px rgba(0,0,0,.08);--s2:0 4px 12px rgba(0,0,0,.08);--s3:0 8px 24px rgba(0,0,0,.10);
  --r:8px;--r2:12px;--r3:16px;
}
html{font-size:14px;color:var(--ink)}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── APP BAR ── */
.bar{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--line);height:52px;padding:0 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--s1)}
.bar-logo{font-size:20px;cursor:pointer;user-select:none;padding:4px 6px;border-radius:6px;transition:background .1s}
.bar-logo:active,.bar-logo.flash{background:var(--blue-lt)}
.bar-title{font-size:15px;font-weight:600;flex:1;color:var(--ink)}
.bar-sub{font-size:10px;font-weight:400;color:var(--ink3);margin-left:6px}
.status-pill{font-size:10px;background:var(--line2);color:var(--ink2);padding:3px 10px;border-radius:20px;border:1px solid var(--line)}
.status-pill.live{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-md)}

/* ── TABS ── */
.tabs{position:sticky;top:52px;z-index:200;background:var(--white);border-bottom:1px solid var(--line);display:flex;padding:0 20px}
.tab{height:42px;padding:0 18px;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
#tab-cfg{display:none}#tab-cfg.on{display:flex}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── REFRESH BAR ── */
.rbar{background:var(--white);border-bottom:1px solid var(--line);padding:8px 20px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--ink3)}
.rbar .spacer{flex:1}
.ts{font-family:'IBM Plex Mono',monospace;font-size:10px}

/* ── FILTER BAR ── */
.fbar{position:sticky;top:94px;z-index:190;background:var(--white);border-bottom:1px solid var(--line);padding:8px 20px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;box-shadow:var(--s1)}
.fg{display:flex;flex-direction:column;gap:2px}
.fl{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.fsel{background:var(--line2);border:1px solid var(--line);border-radius:var(--r);padding:5px 9px;font-size:11px;font-family:inherit;color:var(--ink);outline:none;cursor:pointer;transition:border-color .15s;min-width:88px}
.fsel:focus{border-color:var(--blue);background:var(--white)}
.chips{display:flex;gap:5px;flex-wrap:wrap;align-self:flex-end}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--blue-lt);color:var(--blue);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:500;border:1px solid var(--blue-md)}
.chip-x{cursor:pointer;opacity:.5;font-size:12px;line-height:1}.chip-x:hover{opacity:1}

/* ── CONTENT ── */
.content{padding:18px 20px;max-width:1400px;margin:0 auto}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi:hover{box-shadow:var(--s2)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--blue));border-radius:var(--r2) var(--r2) 0 0}
.kpi-l{font-size:9px;font-weight:600;color:var(--kc,var(--ink3));text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;opacity:.85}
.kpi-v{font-size:22px;font-weight:600;color:var(--kc,var(--ink));font-family:'IBM Plex Mono',monospace;line-height:1}
.kpi-s{font-size:10px;color:var(--ink3);margin-top:4px}
.kpi-b{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:600;margin-top:5px}
.ok{background:var(--green-lt);color:var(--green)}.ng{background:var(--red-lt);color:var(--red)}.warn{background:var(--amber-lt);color:var(--amber)}.info{background:var(--blue-lt);color:var(--blue)}

/* ── CARD ── */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:16px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:var(--s1)}
.card-h{padding:12px 16px 10px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:12px;font-weight:600;color:var(--ink)}
.card-s{font-size:10px;color:var(--ink3);margin-top:1px}
.click-hint{font-size:9px;color:var(--blue);opacity:.65;margin-left:6px}
.card-b{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── ACCORDION (Target Manager) ── */
.acc{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:16px;overflow:hidden}
.acc-hdr{padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .1s}
.acc-hdr:hover{background:var(--line2)}
.acc-hdr-t{font-size:12px;font-weight:600;color:var(--ink);flex:1}
.acc-hdr-s{font-size:10px;color:var(--ink3)}
.acc-arrow{font-size:10px;color:var(--ink3);transition:transform .2s}
.acc-body{display:none;padding:14px 16px;border-top:1px solid var(--line2)}
.acc-body.open{display:block}
.acc-arrow.open{transform:rotate(180deg)}

/* ── TARGET LINE ROWS ── */
.tl-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.tl-row{display:flex;align-items:center;gap:8px;background:var(--line2);border-radius:var(--r);padding:8px 10px;flex-wrap:wrap}
.tl-color{width:18px;height:18px;border-radius:3px;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.ti{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:11px;font-family:inherit;outline:none;background:var(--white);transition:border-color .15s;color:var(--ink)}
.ti:focus{border-color:var(--blue)}
.ti-name{width:100px}.ti-val{width:115px;font-family:'IBM Plex Mono',monospace}
.tl-sel{border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:10px;font-family:inherit;background:var(--white);cursor:pointer;outline:none;color:var(--ink)}
.tl-sel:focus{border-color:var(--blue)}
.tl-chk{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--ink2);cursor:pointer}
input[type=color].tl-cp{width:28px;height:26px;border:1px solid var(--line);border-radius:4px;padding:1px;cursor:pointer;background:var(--white)}
.add-tl{width:100%;padding:7px;border:1.5px dashed var(--blue-md);border-radius:var(--r);background:none;color:var(--blue);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.add-tl:hover{background:var(--blue-lt);border-style:solid}

/* ── TABLE ── */
.tscroll{overflow-x:auto;max-height:400px;overflow-y:auto}
.tscroll::-webkit-scrollbar{width:4px;height:4px}.tscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--line2);color:var(--ink3);padding:8px 11px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--blue)}
thead th.sa::after{content:' ↑';color:var(--blue)}thead th.sd::after{content:' ↓';color:var(--blue)}
tbody tr{border-bottom:1px solid var(--line2);transition:background .1s}
tbody tr:hover{background:var(--blue-lt)}
tbody tr.rhi td{background:rgba(220,38,38,.03)}tbody tr.rno td{background:rgba(217,119,6,.03)}
td{padding:7px 11px;vertical-align:middle}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10px}
.tar{text-align:right}
.tag{display:inline-block;padding:1px 5px;border-radius:20px;font-size:8px;font-weight:700;margin-left:3px}
.tag-h{background:var(--red-lt);color:var(--red)}.tag-n{background:var(--amber-lt);color:var(--amber)}.tag-ok{background:var(--green-lt);color:var(--green)}
tfoot td{background:var(--line2);font-weight:600;padding:8px 11px;border-top:1px solid var(--line)}

/* ── SEARCH & PAGINATION ── */
.sbar{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--line2)}
.si{flex:1;background:var(--line2);border:1px solid transparent;border-radius:var(--r);padding:6px 11px;font-size:11px;font-family:inherit;outline:none;transition:all .15s}
.si:focus{border-color:var(--blue);background:var(--white)}
.sct{font-size:10px;color:var(--ink3);white-space:nowrap}
.pgn{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--line2);flex-wrap:wrap;gap:6px}
.pgi{font-size:10px;color:var(--ink3)}
.pgb-wrap{display:flex;gap:2px}
.pgb{background:var(--white);border:1px solid var(--line);border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;color:var(--ink3);font-family:inherit;transition:all .1s;min-width:26px;text-align:center}
.pgb:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}.pgb.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}.pgb:disabled{opacity:.3;cursor:not-allowed}

/* ── SETUP ── */
.setup-wrap{max-width:640px;margin:28px auto;padding:0 20px}
.setup-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;margin-bottom:14px;box-shadow:var(--s1)}
.setup-head{background:var(--blue);color:#fff;padding:18px 22px}
.setup-head-t{font-size:14px;font-weight:600;margin-bottom:2px}
.setup-head-s{font-size:11px;opacity:.8}
.setup-body{padding:18px 22px}
.gs-row{display:flex;gap:7px;align-items:center;margin-bottom:10px}
.gs-in{flex:1;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--line2)}
.gs-in:focus{border-color:var(--blue);background:var(--white)}
.hint{font-size:10px;color:var(--ink3);line-height:1.7;background:var(--line2);padding:10px 12px;border-radius:var(--r);margin-bottom:10px;border-left:2px solid var(--blue-md)}
.hint code{font-family:'IBM Plex Mono',monospace;font-size:9px;background:var(--white);padding:1px 4px;border-radius:3px;color:var(--blue);border:1px solid var(--line)}
.code-block{background:#0F172A;color:#CBD5E1;border-radius:var(--r);padding:12px;font-size:9.5px;font-family:'IBM Plex Mono',monospace;overflow:auto;max-height:200px;white-space:pre;line-height:1.6;margin:7px 0}
.prog-wrap{margin:8px 0}
.prog-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s}
.prog-lbl{font-size:9px;color:var(--ink3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.gs-st{font-size:10px;padding:3px 0}.gs-st.ok{color:var(--green)}.gs-st.err{color:var(--red)}.gs-st.ld{color:var(--blue)}
.upload-zone{border:1.5px dashed var(--line);border-radius:var(--r2);padding:18px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dz{border-color:var(--blue);background:var(--blue-lt)}
.upload-t{font-size:12px;font-weight:500;margin-bottom:3px}.upload-s{font-size:10px;color:var(--ink3);margin-bottom:10px}
.or-div{text-align:center;margin:12px 0;font-size:10px;color:var(--ink3);position:relative}
.or-div::before,.or-div::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--line)}
.or-div::before{left:0}.or-div::after{right:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:var(--r);padding:7px 14px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1D4ED8}
.btn-outline{background:var(--white);color:var(--blue);border:1px solid var(--blue)}.btn-outline:hover{background:var(--blue-lt)}
.btn-ghost{background:none;color:var(--ink2);border:1px solid var(--line)}.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:none;color:var(--red);border:1px solid var(--red)}.btn-danger:hover{background:var(--red-lt)}
.btn-sm{padding:4px 10px;font-size:10px}

/* ── LOCK ── */
.lock-overlay{position:fixed;inset:0;z-index:999;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lock-box{background:var(--white);border-radius:20px;padding:32px 36px;text-align:center;min-width:280px;box-shadow:var(--s3)}
.lock-title{font-size:14px;font-weight:600;margin-bottom:4px}
.lock-sub{font-size:11px;color:var(--ink3);margin-bottom:16px}
.lock-dots{display:flex;gap:8px;justify-content:center;margin:14px 0}
.ld{width:12px;height:12px;border-radius:50%;background:var(--line);transition:all .15s}
.ld.on{background:var(--blue)}
.ld.err{background:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,52px);gap:7px;justify-content:center;margin:12px 0}
.pin-btn{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:var(--white);font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ink);transition:all .12s}
.pin-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.pin-btn:active{transform:scale(.9)}

/* ── SECTION HEADER ── */
.sec{display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:4px}
.sec-t{font-size:13px;font-weight:600}
.sec-s{font-size:10px;color:var(--ink3);margin-top:1px}

/* ── INSIGHT ── */
.insight{background:var(--blue-lt);border-left:2px solid var(--blue);border-radius:0 var(--r) var(--r) 0;padding:8px 12px;margin-bottom:10px;font-size:11px;line-height:1.6;color:var(--ink2)}

/* ── EMPTY ── */
.empty{padding:56px 20px;text-align:center;color:var(--ink3)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.35}
.empty-t{font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.empty-s{font-size:11px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi{animation:fadeUp .25s ease both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.04s}.kpi:nth-child(3){animation-delay:.06s}
.kpi:nth-child(4){animation-delay:.08s}.kpi:nth-child(5){animation-delay:.10s}.kpi:nth-child(6){animation-delay:.12s}
@media(max-width:880px){.g2,.g3{grid-template-columns:1fr}.content{padding:12px 14px}}
@media(max-width:480px){.kpi-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="bar">
  <span class="bar-logo" id="logo" onclick="logoClick()">📊</span>
  <div class="bar-title">Loss Dashboard<span class="bar-sub">Replan & Add Paper</span></div>
  <div id="appStatus" class="status-pill">ยังไม่มีข้อมูล</div>
</header>

<nav class="tabs">
  <div class="tab active" id="tab-rp" onclick="sw('rp')">🔄 Replan</div>
  <div class="tab" id="tab-ap" onclick="sw('ap')">📄 Add Paper</div>
  <div class="tab" id="tab-cfg" onclick="sw('cfg')">⚙️ ตั้งค่า</div>
</nav>

<!-- ══ REPLAN ══ -->
<div class="page active" id="page-rp">
  <div id="rp-nodata"><div class="setup-wrap" id="rp-nd"></div></div>
  <div id="rp-setup" style="display:none"><div class="setup-wrap" id="rp-si"></div></div>
  <div id="rp-live" style="display:none">
    <div class="rbar">
      <button class="btn btn-blue btn-sm" onclick="refreshRP()">↺ Refresh</button>
      <span id="rp-src"></span>
      <span class="spacer"></span>
      <span class="ts" id="rp-ts"></span>
      <button class="btn btn-ghost btn-sm" id="rp-chg" style="display:none" onclick="showSetup('rp')">เปลี่ยนแหล่งข้อมูล</button>
    </div>
    <div class="fbar">
      <div class="fg"><span class="fl">ปี</span><select class="fsel" id="rp-fy" onchange="rpF()"></select></div>
      <div class="fg"><span class="fl">เดือน</span><select class="fsel" id="rp-fm" onchange="rpF()"></select></div>
      <div class="fg"><span class="fl">Machine</span><select class="fsel" id="rp-fmc" onchange="rpF()"></select></div>
      <div class="fg"><span class="fl">Problem</span><select class="fsel" id="rp-fpb" onchange="rpF()"></select></div>
      <div class="fg"><span class="fl">แผนก</span><select class="fsel" id="rp-fd" onchange="rpF()"></select></div>
      <div class="fg"><span class="fl">โรงงาน</span><select class="fsel" id="rp-ff" onchange="rpF()"></select></div>
      <button class="btn btn-ghost btn-sm" onclick="rpRst()">↺ Reset</button>
      <div class="chips" id="rp-chips"></div>
    </div>
    <div class="content" id="rp-content"></div>
  </div>
</div>

<!-- ══ ADD PAPER ══ -->
<div class="page" id="page-ap">
  <div id="ap-nodata"><div class="setup-wrap" id="ap-nd"></div></div>
  <div id="ap-setup" style="display:none"><div class="setup-wrap" id="ap-si"></div></div>
  <div id="ap-live" style="display:none">
    <div class="rbar">
      <button class="btn btn-blue btn-sm" onclick="refreshAP()">↺ Refresh</button>
      <span id="ap-src"></span>
      <span class="spacer"></span>
      <span class="ts" id="ap-ts"></span>
      <button class="btn btn-ghost btn-sm" id="ap-chg" style="display:none" onclick="showSetup('ap')">เปลี่ยนแหล่งข้อมูล</button>
    </div>
    <div class="fbar">
      <div class="fg"><span class="fl">ปี</span><select class="fsel" id="ap-fy" onchange="apF()"></select></div>
      <div class="fg"><span class="fl">เดือน</span><select class="fsel" id="ap-fm" onchange="apF()"></select></div>
      <div class="fg"><span class="fl">แผนก</span><select class="fsel" id="ap-fd" onchange="apF()"></select></div>
      <div class="fg"><span class="fl">โรงงาน</span><select class="fsel" id="ap-ff" onchange="apF()"></select></div>
      <button class="btn btn-ghost btn-sm" onclick="apRst()">↺ Reset</button>
      <div class="chips" id="ap-chips"></div>
    </div>
    <div class="content" id="ap-content"></div>
  </div>
</div>

<!-- ══ CONFIG ══ -->
<div class="page" id="page-cfg">
  <div class="content" style="max-width:660px">
    <div style="padding-top:6px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:15px;font-weight:600">⚙️ ตั้งค่า</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">แหล่งข้อมูล, Target Lines, PIN</div></div>
      <button class="btn btn-danger btn-sm" onclick="lockCfg()">🔒 ล็อก</button>
    </div>
    <div id="cfg-body"></div>
  </div>
</div>

<!-- LOCK -->
<div class="lock-overlay" id="lockOv" style="display:none">
  <div class="lock-box">
    <div style="font-size:32px;margin-bottom:8px">🔒</div>
    <div class="lock-title">ยืนยันตัวตน</div>
    <div class="lock-sub" id="lock-sub">กรอก PIN 4 หลัก</div>

const GS_CODE=`function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheetName = (e&&e.parameter&&e.parameter.sheet)||'Replan';
  var sh = ss.getSheetByName(sheetName)||ss.getSheets()[0];
  var page = (e&&e.parameter&&e.parameter.page)?parseInt(e.parameter.page):0;
  var pageSize = 5000;
  var all = sh.getDataRange().getValues();
  var totalRows = all.length-1;
  var rows = page===0 ? all.slice(0,Math.min(1+pageSize,all.length))
                      : all.slice(1+page*pageSize, Math.min(1+(page+1)*pageSize,all.length));
  return ContentService.createTextOutput(JSON.stringify({
    data:rows, totalRows:totalRows, pageSize:pageSize, page:page, sheet:sheetName
  })).setMimeType(ContentService.MimeType.JSON);
}`;

// Cache in memory, load from GS on init
let TL = {rp:[], ap:[], loaded:false};

const TL_DEFAULTS = {
  rp:[{id:1,name:'Target',val:500000,color:'#2563EB',dash:'dashed',curve:'step',show:true}],
  ap:[{id:1,name:'Target',val:400000,color:'#7C3AED',dash:'dashed',curve:'step',show:true}]
};

async function loadTargetLines(){
  const url = (localStorage.getItem('gs_url')||'').trim();
  if(!url){TL.rp=JSON.parse(localStorage.getItem('tl_rp')||'null')||TL_DEFAULTS.rp;TL.ap=JSON.parse(localStorage.getItem('tl_ap')||'null')||TL_DEFAULTS.ap;TL.loaded=true;return;}
  try{
    const res = await fetch(`${url}?sheet=Config`);
    const d = await res.json();
    if(d.data&&d.data.length>1){
      const hdrs=d.data[0];
      const rows=d.data.slice(1);
      const get=(r,h)=>r[hdrs.findIndex(x=>String(x).toLowerCase()===h.toLowerCase())]??'';
      const rpLines=[],apLines=[];
      rows.forEach(r=>{
        const tab=String(get(r,'tab')).toLowerCase();
        const ln={id:Date.now()+Math.random(),name:String(get(r,'name')||'Target'),val:parseFloat(get(r,'val'))||0,color:String(get(r,'color')||'#2563EB'),dash:String(get(r,'dash')||'dashed'),curve:String(get(r,'curve')||'step'),show:String(get(r,'show')).toLowerCase()!=='false'};
        if(tab==='rp'||tab==='replan')rpLines.push(ln);
        if(tab==='ap'||tab==='addpaper')apLines.push(ln);
      });
      TL.rp=rpLines.length?rpLines:TL_DEFAULTS.rp;
      TL.ap=apLines.length?apLines:TL_DEFAULTS.ap;
    } else {
      TL.rp=TL_DEFAULTS.rp;TL.ap=TL_DEFAULTS.ap;
    }
  }catch{TL.rp=JSON.parse(localStorage.getItem('tl_rp')||'null')||TL_DEFAULTS.rp;TL.ap=JSON.parse(localStorage.getItem('tl_ap')||'null')||TL_DEFAULTS.ap;}
  TL.loaded=true;
}

function dzO(e,id){e.preventDefault();document.getElementById(id)?.classList.add('dz');}
function dzL(id){document.getElementById(id)?.classList.remove('dz');}
function dzD(e,k){e.preventDefault();dzL(k+'-dz');const f=e.dataTransfer.files[0];if(f)k==='rp'?doXlsxRP(f):doXlsxAP(f);}
function hFRP(i){if(i.files[0])doXlsxRP(i.files[0]);}
function hFAP(i){if(i.files[0])doXlsxAP(i.files[0]);}

function doXlsxRP(file){
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});const sn=wb.SheetNames.find(n=>n.toLowerCase()==='replan')||wb.SheetNames[0];const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});RP.all=rows.map(rpRow).filter(r=>r.val>0||r.jo);RP.src={type:'xlsx',name:file.name};localStorage.setItem('rp_src','xlsx');RP.ts=new Date();initRP();}catch(err){alert('Error: '+err.message);}};
  r.readAsArrayBuffer(file);
}
function doXlsxAP(file){
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});const sn=wb.SheetNames.find(n=>n.toLowerCase()==='addpaper')||wb.SheetNames[0];const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});AP.all=rows.map(apRow).filter(r=>r.val>0||r.jo);AP.src={type:'xlsx',name:file.name};localStorage.setItem('ap_src','xlsx');AP.ts=new Date();initAP();}catch(err){alert('Error: '+err.message);}};
  r.readAsArrayBuffer(file);
}

function parseCause(raw){
  if(!raw)return{machine:'OTHER',problem:'OTHER'};
  const c=String(raw).split('\n')[0].trim();
  let m=c.match(/^([^-+]+?)-(.+?)\+\d+/);
  if(m)return{machine:cmc(m[1]),problem:cpc(m[2])};
  m=c.match(/^([^+]+)\+\d+/);
  if(m)return{machine:cmc(m[1]),problem:'UNKNOWN'};
  return{machine:cmc(c),problem:'OTHER'};
}
const cmc=s=>String(s||'').replace(/[-_+].*$/,'').trim().toUpperCase()||'OTHER';
const cpc=s=>String(s||'').replace(/\+\d+.*$/,'').trim()||'OTHER';
function getDP(d){
  if(!d)return{yr:0,mo:0};
  if(d instanceof Date&&!isNaN(d))return{yr:d.getFullYear(),mo:d.getMonth()+1};
  if(typeof d==='number'&&d>40000){const dd=new Date(Math.round((d-25569)*86400*1000));return{yr:dd.getFullYear(),mo:dd.getMonth()+1};}
  const s2=String(d),sep=s2.includes('/')?'/':(s2.includes('-')?'-':null);
  if(sep){const ps=s2.split(sep);if(ps.length>=2){const a=parseInt(ps[0]),b=parseInt(ps[1]),c=parseInt(ps[2]||0);if(a>2000)return{yr:a,mo:b};if(c>2000)return{yr:c,mo:b};if(c>0)return{yr:2000+c,mo:b};}}
  const nd=new Date(d);return isNaN(nd)?{yr:0,mo:0}:{yr:nd.getFullYear(),mo:nd.getMonth()+1};
}
const nv=v=>parseFloat(String(v||'').replace(/,/g,''))||0;
const sv=v=>String(v||'').trim();
const kk=(r,k)=>Object.keys(r).find(x=>x.toLowerCase().trim()===k)||Object.keys(r).find(x=>x.toLowerCase().includes(k));

function rpRow(r){
  const{yr,mo}=getDP(r[kk(r,'date')]||'');
  const{machine,problem}=parseCause(r[kk(r,'cause')]||'');
  const{dept,proc,fac}=mcLookup(machine);
  return{jo:sv(r['JO']||r[kk(r,'jo')]||''),compnt:sv(r[kk(r,'compnt')]||r[kk(r,'component')]||r[kk(r,'code')]||''),machine,problem,dept,proc,fac,val:nv(r[kk(r,'val')]||0),check:parseInt(r[kk(r,'check')]||1)||1,yr,mo};
}
function apRow(r){
  const{yr,mo}=getDP(r[kk(r,'date')]||'');
  const dept=sv(r[kk(r,'dept')]||'');
  const mc=sv(r['MC']||r[kk(r,'mc')]||'');
  const lkp=mcLookup(mc)||{};
  return{jo:sv(r['JO']||r[kk(r,'jo')]||''),code:sv(r[kk(r,'code')]||''),sh:nv(r[kk(r,'sh')]||0),cause:sv(r[kk(r,'cause')]||'').replace(/\s+/g,' '),dept:dept||lkp.dept||'OTHER',facc:sv(r[kk(r,'facc')]||''),mc,val:nv(r[kk(r,'val')]||0),check:parseInt(r[kk(r,'check')]||1)||1,yr,mo};
}

async function loadGS(k){
  const url=(document.getElementById(`${k}-gsu`)?.value||document.getElementById('cfg-gsu')?.value||localStorage.getItem('gs_url')||'').trim();
  if(!url){alert('กรุณาใส่ URL ครับ');return;}
  localStorage.setItem('gs_url',url);
  const pEl=document.getElementById(`${k}-prog`),pfEl=document.getElementById(`${k}-pf`),plEl=document.getElementById(`${k}-pl`);
  const stEl=document.getElementById(`${k}-st`),cfgSt=document.getElementById(`cfg-${k}-st`);
  const sn=k==='rp'?'Replan':'Addpaper';
  const sp=(p,m)=>{if(pfEl)pfEl.style.width=p+'%';if(plEl)plEl.textContent=m;};
  if(pEl)pEl.style.display='';
  if(stEl){stEl.className='gs-st ld';stEl.textContent='กำลังโหลด...';}
  sp(5,'เชื่อมต่อ...');
  try{
    let all=[],hdrs=[],pg=0,tot=Infinity;
    while(all.length<tot){
      const res=await Promise.race([fetch(`${url}?sheet=${encodeURIComponent(sn)}&page=${pg}`),new Promise((_,rj)=>setTimeout(()=>rj(new Error('Timeout')),25000))]);
      const d=await res.json();const raw=d.data||[];if(!raw.length)break;
      if(pg===0){hdrs=raw[0];tot=d.totalRows||raw.length-1;}
      const sl=pg===0?raw.slice(1):raw;
      all=all.concat(sl.map(row=>{const o={};hdrs.forEach((h,i)=>{o[String(h)]=row[i]??'';});return o;}));
      sp(Math.round(Math.min(10+all.length/Math.max(tot,1)*80,90)),`${all.length.toLocaleString()}/${tot.toLocaleString()}`);
      if(all.length>=tot||sl.length<(d.pageSize||5000))break;pg++;
    }
    sp(100,'สำเร็จ');
    if(k==='rp'){RP.all=all.map(rpRow).filter(r=>r.val>0||r.jo);RP.src={type:'gs',sheet:sn,url};RP.ts=new Date();localStorage.setItem('rp_src','gs');initRP();}
    else{AP.all=all.map(apRow).filter(r=>r.val>0||r.jo);AP.src={type:'gs',sheet:sn,url};AP.ts=new Date();localStorage.setItem('ap_src','gs');initAP();}
    if(stEl){stEl.className='gs-st ok';stEl.textContent=`โหลดแล้ว ${all.length.toLocaleString()} แถว (${sn})`;}
    if(cfgSt){cfgSt.style.color='var(--green)';cfgSt.textContent=`${k==='rp'?'RP':'AP'}: ${all.length.toLocaleString()} แถว`;}
    setTimeout(()=>{if(pEl)pEl.style.display='none';},1200);
  }catch(err){
    if(pEl)pEl.style.display='none';
    if(stEl){stEl.className='gs-st err';stEl.textContent='โหลดไม่สำเร็จ: '+err.message;}
    if(cfgSt){cfgSt.style.color='var(--red)';cfgSt.textContent='Error: '+err.message;}
    alert(`โหลดไม่สำเร็จ: ${err.message}\n\nตรวจสอบ:\n• Apps Script Deploy เป็น Anyone\n• Sheet ชื่อ "${sn}" ถูกต้อง`);
  }
}
async function autoGS(k,url){const el=document.getElementById(`${k}-gsu`);if(el)el.value=url;await loadGS(k);}
function refreshRP(){if(RP.src?.type==='gs')loadGS('rp');else alert('ลากไฟล์ Excel ใหม่เพื่ออัปเดตครับ');}
function refreshAP(){if(AP.src?.type==='gs')loadGS('ap');else alert('ลากไฟล์ Excel ใหม่เพื่ออัปเดตครับ');}

function fSel(id,vals,all,fmt2){
  const el=document.getElementById(id);if(!el)return;const cur=el.value;
  el.innerHTML=`<option value="">— ${all} —</option>`+vals.map(v=>`<option value="${v}">${fmt2?fmt2(v):v}</option>`).join('');
  if([...el.options].some(o=>o.value===String(cur)))el.value=String(cur);
}
function buildSelRP(){
  fSel('rp-fy',[...new Set(RP.all.map(r=>r.yr).filter(Boolean))].sort(),'ทุกปี');

  fSel('rp-fpb',[...new Set(RP.all.map(r=>r.problem).filter(p=>p&&!['OTHER','UNKNOWN'].includes(p)))].sort(),'ทุกปัญหา');
  fSel('rp-fd',[...new Set(RP.all.map(r=>r.dept).filter(d=>d&&d!=='OTHER'))].sort(),'ทุกแผนก');
  fSel('rp-ff',[...new Set(RP.all.map(r=>r.fac).filter(f=>f&&f!=='OTHER'))].sort(),'ทุกโรงงาน');
}
function rpF(){
  const y=document.getElementById('rp-fy').value,m=document.getElementById('rp-fm').value;

function buildRPCharts(d,mos){
  // Monthly
  const mo={};d.forEach(r=>{if(r.yr&&r.mo){const k=`${r.yr}-${String(r.mo).padStart(2,'0')}`;mo[k]=(mo[k]||0)+r.val;}});
  const mK=Object.keys(mo).sort(),mV=mK.map(k=>mo[k]);
  const mL=mK.map(k=>{const[y,m]=k.split('-');return`${MN[parseInt(m)]}'${y.slice(2)}`;});
  const tds=buildTDS('rp',mK.length);
  dc('rpM');
  CHS['rpM']=new Chart(document.getElementById('rpMo'),{type:'bar',data:{labels:mL,datasets:[{label:'฿',data:mV,backgroundColor:mV.map(v=>{const ov=tds.filter(l=>v>l.data[0]);return ov.length?'#DC2626':'#2563EB';}),borderRadius:4,order:2},...tds]},options:moOpts()});

  // Machine
  const mcG={};d.forEach(r=>{if(r.machine&&r.machine!=='OTHER')mcG[r.machine]=(mcG[r.machine]||0)+r.val;});
  const mcS=Object.entries(mcG).sort((a,b)=>b[1]-a[1]).slice(0,12);
  dc('rpMC');
  const rpMCPlug = makeClickPlugin('rpMC', lbl => {
    const el = document.getElementById('rp-fmc'); if(!el) return;
    el.value = lbl || ''; rpF();
  });
  CHS['rpMC']=new Chart(document.getElementById('rpMC'),{type:'bar',data:{labels:mcS.map(x=>x[0]),datasets:[{data:mcS.map(x=>x[1]),backgroundColor:mcS.map(()=>'#2563EB'),_baseColor:'#2563EB',borderRadius:3}]},options:hOpts(rpMCPlug)});

  // Dept chart
  const dG={};d.forEach(r=>{if(r.dept&&r.dept!=='OTHER')dG[r.dept]=(dG[r.dept]||0)+r.val;});
  const dS=Object.entries(dG).sort((a,b)=>b[1]-a[1]);
  dc('rpDept');
  const rpDeptPlug = makeClickPlugin('rpDept', lbl => {
    const el = document.getElementById('rp-fd'); if(!el) return;
    el.value = lbl || ''; rpF();
  });
  CHS['rpDept']=new Chart(document.getElementById('rpDept'),{type:'bar',data:{labels:dS.map(x=>x[0]),datasets:[{data:dS.map(x=>x[1]),backgroundColor:dS.map(()=>'#3B82F6'),_baseColor:'#3B82F6',borderRadius:3}]},options:hOpts(rpDeptPlug)});

  // Factory chart
  const fG={};d.forEach(r=>{if(r.fac&&r.fac!=='OTHER')fG[r.fac]=(fG[r.fac]||0)+r.val;});
  const fS=Object.entries(fG).sort((a,b)=>b[1]-a[1]);
  dc('rpFac');
  const rpFacPlug = makeClickPlugin('rpFac', lbl => {
    const el = document.getElementById('rp-ff'); if(!el) return;
    el.value = lbl || ''; rpF();
  });
  CHS['rpFac']=new Chart(document.getElementById('rpFac'),{type:'bar',data:{labels:fS.map(x=>x[0]),datasets:[{data:fS.map(x=>x[1]),backgroundColor:fS.map(()=>'#60A5FA'),_baseColor:'#60A5FA',borderRadius:3}]},options:hOpts(rpFacPlug)});

  // Pareto
  buildPareto('rpP1','rp-pi1',Object.fromEntries(Object.entries(d.reduce((a,r)=>{if(r.problem&&!['OTHER','UNKNOWN'].includes(r.problem))a[r.problem]=(a[r.problem]||0)+r.val;return a;},{}))));
  buildPareto('rpP2','rp-pi2',mcG);

  // Product
  const pG={};d.forEach(r=>{if(r.compnt)pG[r.compnt]=(pG[r.compnt]||0)+r.val;});
  const pS=Object.entries(pG).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const pb=document.getElementById('rp-pb');if(pb)pb.textContent=`Top ${pS.length}`;
  dc('rpProd');
  const rpProdPlug = makeClickPlugin('rpProd', lbl => {
    const si = document.getElementById('rp-si2'); if(!si) return;
    if(lbl){ si.value = lbl.replace('…',''); } else { si.value=''; }
    rpSrch();
  });
  CHS['rpProd']=new Chart(document.getElementById('rpProd'),{type:'bar',data:{labels:pS.map(x=>x[0].length>28?x[0].slice(0,27)+'…':x[0]),datasets:[{data:pS.map(x=>x[1]),backgroundColor:pS.map(()=>'#1D4ED8'),_baseColor:'#1D4ED8',borderRadius:3}]},options:{...hOpts(rpProdPlug),layout:{padding:{right:60}}}});
}

// ═══════════════════════════════════════
// CHART CLICK FILTER STATE
// ═══════════════════════════════════════
const CHART_SEL = {}; // chartId -> selectedLabel or null

function chartClick(chartId, label, filterFn) {
  // toggle selection
  if (CHART_SEL[chartId] === label) {
    CHART_SEL[chartId] = null;
    filterFn(null);
  } else {
    CHART_SEL[chartId] = label;
    filterFn(label);
  }
}

// Apply fade: selected bar full opacity, others 0.25
function applyChartFade(chart, selectedIdx) {
  const ds = chart.data.datasets[0];
  const n = ds.data.length;
  if (selectedIdx === null || selectedIdx === undefined) {
    // reset all to full
    ds.backgroundColor = Array(n).fill(ds._baseColor || ds.backgroundColor[0] || '#2563EB');
  } else {
    const base = ds._baseColor || ds.backgroundColor[0] || '#2563EB';
    ds._baseColor = base;
    ds.backgroundColor = ds.data.map((_, i) => i === selectedIdx ? base : hexFade(base, 0.22));
  }
  chart.update('none');
}

function hexFade(color, alpha) {
  // Convert hex to rgba with alpha
  const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function makeClickPlugin(chartId, filterFn) {
  return {
    id: 'clickFilter_'+chartId,
    afterEvent(chart, args) {
      if (args.event.type !== 'click') return;
      const pts = chart.getElementsAtEventForMode(args.event.native, 'nearest', {intersect:true}, true);
      if (!pts.length) {
        // click outside — reset
        CHART_SEL[chartId] = null;
        applyChartFade(chart, null);
        filterFn(null);
        return;
      }
      const idx = pts[0].index;
      const label = chart.data.labels[idx];
      const prev = CHART_SEL[chartId];
      if (prev === label) {
        CHART_SEL[chartId] = null;
        applyChartFade(chart, null);
        filterFn(null);
      } else {
        CHART_SEL[chartId] = label;
        applyChartFade(chart, idx);
        filterFn(label);
      }
    }
  };
}

function buildTDS(k,n){
  return (TL[k]||[]).filter(l=>l.show!==false).map(ln=>({
    label:ln.name,data:Array(n).fill(ln.val),type:'line',
    borderColor:ln.color,borderWidth:1.5,
    borderDash:ln.dash==='dashed'?[7,4]:ln.dash==='dotted'?[2,3]:[],
    pointRadius:0,fill:false,
    tension:ln.curve==='smooth'?.35:0,
    stepped:ln.curve==='step'?true:false,
    yAxisID:'y',order:0,
  }));
}
function moOpts(){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:9},boxWidth:12,usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.type==='line'?` ${c.dataset.label}: ${fB(c.parsed.y)} THB`:` ${fB(c.parsed.y)} THB`}}},
    scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}}},
    animation:{onComplete(ctx){lblV(ctx.chart);}}};
}
function hOpts(clickPlugin){
  const plugins = {legend:{display:false},tooltip:{callbacks:{label:c=>` ${fB(c.parsed.x)} THB`}}};
  if(clickPlugin) plugins[clickPlugin.id] = clickPlugin;
  return{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins,
    scales:{x:{ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}},y:{ticks:{font:{size:10}},grid:{display:false}}},
    onHover(e,els){e.native.target.style.cursor=els.length?'pointer':'default';},
    animation:{onComplete(ctx){lblH(ctx.chart);}}};
}
function lblV(ch){const c=ch.ctx;c.save();c.font='bold 8px IBM Plex Mono';c.textAlign='center';c.fillStyle='#555';ch.data.datasets[0]?.data.forEach((v,i)=>{const mm=ch.getDatasetMeta(0);if(mm.data[i]){const b=mm.data[i].getProps(['x','y'],true);c.fillText(fB(v),b.x,b.y-5);}});c.restore();}
function lblH(ch){const c=ch.ctx;c.save();c.font='8px IBM Plex Mono';c.fillStyle='#555';c.textAlign='left';ch.data.datasets[0]?.data.forEach((v,i)=>{const mm=ch.getDatasetMeta(0);if(mm.data[i]){const b=mm.data[i].getProps(['x','y'],true);c.fillText(fB(v),b.x+4,b.y+4);}});c.restore();}
function buildPareto(cid,iid,grp){
  const s=Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const tot=s.reduce((a,[,v])=>a+v,0);if(!tot)return;
  let cum=0;const cp=s.map(([,v])=>{cum+=v;return+(cum/tot*100).toFixed(1);});
  let n80=0,v80=0;for(const[,v]of s){n80++;v80+=v;if(v80/tot>=0.8)break;}
  const el=document.getElementById(iid);
  if(el){el.style.display='block';el.innerHTML=`${n80} รายการแรกคิดเป็น <strong>${Math.round(v80/tot*100)}%</strong> ของทั้งหมด${s[0]?` — "${s[0][0]}" สูงสุด <strong>${fB(s[0][1])}</strong>`:''}`;};
  dc(cid);
  const parPlug = makeClickPlugin(cid, lbl => {
    if(!lbl) return;
    // detect which tab and filter accordingly
    if(cid.startsWith('rp')) {
      if(cid==='rpP1') { const e=document.getElementById('rp-fpb'); if(e){ e.value=lbl.replace('…',''); rpF(); } }
      else if(cid==='rpP2') { const e=document.getElementById('rp-fmc'); if(e){ e.value=lbl.replace('…',''); rpF(); } }
    } else {
      const si=document.getElementById('ap-si2'); if(si){ si.value=lbl.replace('…',''); apSrch(); }
    }
    if(!lbl) { if(cid.startsWith('rp')){if(cid==='rpP1'){const e=document.getElementById('rp-fpb');if(e){e.value='';rpF();}}else{const e=document.getElementById('rp-fmc');if(e){e.value='';rpF();}}}else{const si=document.getElementById('ap-si2');if(si){si.value='';apSrch();}}}
  });
  CHS[cid]=new Chart(document.getElementById(cid),{type:'bar',data:{labels:s.map(([k])=>k.length>16?k.slice(0,15)+'…':k),datasets:[{label:'มูลค่า',data:s.map(([,v])=>v),backgroundColor:s.map(()=>'#2563EB'),_baseColor:'#2563EB',borderRadius:3,yAxisID:'y'},{label:'%สะสม',data:cp,type:'line',borderColor:'#DC2626',borderWidth:1.5,pointRadius:2,pointBackgroundColor:'#DC2626',fill:false,yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},boxWidth:10}},[parPlug.id]:parPlug,tooltip:{callbacks:{label:c=>c.datasetIndex===0?` ${f(c.parsed.y)} THB`:` ${c.parsed.y}%`}}},onHover(e,els){e.native.target.style.cursor=els.length?'pointer':'default';},scales:{x:{ticks:{font:{size:8},maxRotation:35},grid:{display:false}},y:{position:'left',ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}},y2:{position:'right',min:0,max:100,ticks:{callback:v=>v+'%',font:{size:9},color:'#DC2626'},grid:{display:false}}}}});
}

function rpSort(c){if(RP.srt.c===c)RP.srt.d*=-1;else{RP.srt.c=c;RP.srt.d=-1;}rpTbl();}
function rpTbl(){
  let data=RP.fil.filter(r=>!RP.q||[r.jo,r.compnt,r.machine,r.problem,r.dept,r.fac].join(' ').toLowerCase().includes(RP.q));
  data=[...data].sort((a,b)=>{const va=a[RP.srt.c],vb=b[RP.srt.c];return(typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''),'th'))*RP.srt.d;});
  document.querySelectorAll('#rp-content thead th').forEach((th,i)=>{th.classList.remove('sa','sd');const ks=['jo','compnt','machine','problem','dept','fac','mo','val',''][i];if(ks===RP.srt.c)th.classList.add(RP.srt.d>0?'sa':'sd');});
  const tot=data.length,pages=Math.ceil(tot/PAGE)||1;RP.pg=Math.min(RP.pg,pages-1);
  const sl=data.slice(RP.pg*PAGE,(RP.pg+1)*PAGE);
  const sc=document.getElementById('rp-sc');if(sc)sc.textContent=RP.q?`พบ ${tot.toLocaleString()}/${RP.fil.length.toLocaleString()}`:tot.toLocaleString()+' รายการ';
  const sub=document.getElementById('rp-tsub');if(sub)sub.textContent=`${RP.fil.length.toLocaleString()} รายการ`;
  const tb=document.getElementById('rp-tb');if(!tb)return;
  tb.innerHTML=sl.map(r=>`<tr class="${r.val>=5000?'rhi':''} ${r.check===0?'rno':''}">
    <td class="mono">${r.jo}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.compnt}">${r.compnt}</td>
    <td><strong>${r.machine}</strong></td>
    <td>${r.problem}</td>
    <td>${r.dept}</td><td>${r.fac}</td>
    <td style="white-space:nowrap">${MN[r.mo]||''} ${r.yr}</td>
    <td class="tar mono" style="color:${r.val>=5000?'var(--red)':'var(--blue)'}">${f(r.val)}${r.val>=5000?'<span class="tag tag-h">HIGH</span>':''}</td>
    <td>${r.check===0?'<span class="tag tag-n">รอ</span>':'<span class="tag tag-ok">✓</span>'}</td>
  </tr>`).join('');
  const tv=data.reduce((a,r)=>a+r.val,0);
  const tf=document.getElementById('rp-tf');if(tf)tf.innerHTML=`<td colspan="7">รวม ${data.length.toLocaleString()}</td><td class="tar mono">${f(tv)}</td><td></td>`;
  pgn('rp-pg',RP.pg,pages,tot,p=>{RP.pg=p;rpTbl();});
}

function apSrch(){AP.q=document.getElementById('ap-si2').value.toLowerCase();AP.pg=0;apTbl();}
function apSort(c){if(AP.srt.c===c)AP.srt.d*=-1;else{AP.srt.c=c;AP.srt.d=-1;}apTbl();}
function apTbl(){
  let data=AP.fil.filter(r=>!AP.q||[r.jo,r.code,r.cause,r.dept,r.facc].join(' ').toLowerCase().includes(AP.q));
  data=[...data].sort((a,b)=>{const va=a[AP.srt.c],vb=b[AP.srt.c];return(typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''),'th'))*AP.srt.d;});
  const tot=data.length,pages=Math.ceil(tot/PAGE)||1;AP.pg=Math.min(AP.pg,pages-1);
  const sl=data.slice(AP.pg*PAGE,(AP.pg+1)*PAGE);
  const sc=document.getElementById('ap-sc');if(sc)sc.textContent=AP.q?`พบ ${tot.toLocaleString()}/${AP.fil.length.toLocaleString()}`:tot.toLocaleString()+' รายการ';
  const sub=document.getElementById('ap-tsub');if(sub)sub.textContent=`${AP.fil.length.toLocaleString()} รายการ`;
  const tb=document.getElementById('ap-tb');if(!tb)return;
  tb.innerHTML=sl.map(r=>`<tr class="${r.val>=5000?'rhi':''} ${r.check===0?'rno':''}">
    <td class="mono">${r.jo}</td>
    <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.code}">${r.code}</td>
    <td>${r.cause}</td><td><strong>${r.dept}</strong></td><td>${r.facc||r.fac||''}</td>
    <td style="white-space:nowrap">${MN[r.mo]||''} ${r.yr}</td>
    <td class="tar mono" style="color:${r.val>=5000?'var(--red)':'#7C3AED'}">${f(r.val)}${r.val>=5000?'<span class="tag tag-h">HIGH</span>':''}</td>
    <td>${r.check===0?'<span class="tag tag-n">รอ</span>':'<span class="tag tag-ok">✓</span>'}</td>
  </tr>`).join('');
  const tv=data.reduce((a,r)=>a+r.val,0);
  const tf=document.getElementById('ap-tf');if(tf)tf.innerHTML=`<td colspan="6">รวม ${data.length.toLocaleString()}</td><td class="tar mono">${f(tv)}</td><td></td>`;
  pgn('ap-pg',AP.pg,pages,tot,p=>{AP.pg=p;apTbl();});
}

// HELPERS
// ═══════════════════════════════════════
function mkEl(t,c){const e=document.createElement(t);e.className=c;return e;}
let _shCount = {};
function sh(con,title,sub,subId){
  const d=document.createElement('div');d.className='sec';
  d.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div class="sec-t">${title}</div>${sub?`<div class="sec-s"${subId?` id="${subId}"`:''} >${sub}</div>`:''}</div>`;
  con.appendChild(d);
}
function mkCd(title,sub,body){
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-h"><div><div class="card-t">${title}</div>${sub?`<div class="card-s">${sub}</div>`:''}</div></div><div class="card-b">${body}</div>`;
  return c;
}
function mkCdB(title,sub,bid,body){
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-h"><div><div class="card-t">${title}</div>${sub?`<div class="card-s">${sub}</div>`:''}</div>${bid?`<span style="font-size:10px;color:var(--ink3);font-weight:600" id="${bid}">—</span>`:''}</div><div class="card-b">${body}</div>`;
  return c;
}
function pgn(id,pg,pages,tot,cb){
  const el=document.getElementById(id);if(!el)return;
  if(pages<=1){el.innerHTML='';return;}
  const s=pg*PAGE+1,e=Math.min((pg+1)*PAGE,tot);
  const show=new Set([0,pg-1,pg,pg+1,pages-1].filter(x=>x>=0&&x<pages));
  let btns='',prev=-1;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(prev>=0&&p>prev+1)btns+=`<span style="padding:0 3px;color:var(--ink3)">…</span>`;
    btns+=`<button class="pgb${p===pg?' on':''}" onclick="(${cb.toString()})(${p})">${p+1}</button>`;prev=p;
  });
  el.innerHTML=`<div class="pgi">${s.toLocaleString()}–${e.toLocaleString()} จาก ${tot.toLocaleString()}</div><div class="pgb-wrap"><button class="pgb" ${pg===0?'disabled':''} onclick="(${cb.toString()})(${pg-1})">‹</button>${btns}<button class="pgb" ${pg===pages-1?'disabled':''} onclick="(${cb.toString()})(${pg+1})">›</button></div>`;
}
