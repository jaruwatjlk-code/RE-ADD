<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loss Dashboard — Replan & Add Paper</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1565C0;--blue-lt:#E3F2FD;--blue-mid:#42A5F5;
  --purple:#6A1B9A;--purple-lt:#F3E5F5;
  --red:#C62828;--red-lt:#FDECEA;
  --orange:#E65100;--orange-lt:#FFF3E0;
  --green:#2E7D32;--green-lt:#E8F5E9;
  --teal:#00695C;
  --gray-50:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#EEEEEE;
  --gray-300:#E0E0E0;--gray-600:#757575;--gray-800:#424242;--gray-900:#212121;
  --s1:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.07);
  --s2:0 2px 8px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.07);
  --s3:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.07);
  --r8:8px;--r12:12px;--r16:16px;
}
html{font-size:14px}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:#F0F4F8;color:var(--gray-900);-webkit-font-smoothing:antialiased;min-height:100vh}

/* APP BAR */
.app-bar{position:sticky;top:0;z-index:300;background:var(--blue);color:#fff;height:56px;padding:0 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.app-logo{font-size:22px;cursor:pointer;user-select:none;transition:transform .1s;border-radius:6px;padding:2px 4px}
.app-logo:active{transform:scale(.88)}
.app-logo.flash{animation:logoFlash .25s ease}
@keyframes logoFlash{0%{background:rgba(255,255,255,.35)}100%{background:transparent}}
.app-title{font-size:17px;font-weight:600;flex:1}
.app-sub{font-size:10px;opacity:.75;font-weight:400}
#appStatus{font-size:10px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.unlock-hint{font-size:10px;opacity:.55;display:none}

/* TABS */
.tabs{position:sticky;top:56px;z-index:200;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;padding:0 20px;box-shadow:var(--s1)}
.tab{padding:0 20px;height:44px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;user-select:none}
.tab:hover{color:var(--blue);background:rgba(21,101,192,.04)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
#tab-cfg{display:none}
#tab-cfg.unlocked{display:flex}

/* PAGES */
.page{display:none}.page.active{display:block}

/* SETUP PANEL */
.setup-wrap{max-width:680px;margin:32px auto;padding:0 20px}
.setup-card{background:#fff;border-radius:var(--r16);border:1px solid var(--gray-200);box-shadow:var(--s2);overflow:hidden;margin-bottom:16px}
.setup-hdr{background:linear-gradient(135deg,var(--blue),#1976D2);color:#fff;padding:20px 24px}
.setup-hdr-title{font-size:16px;font-weight:600;margin-bottom:4px}
.setup-hdr-sub{font-size:12px;opacity:.85}
.setup-body{padding:20px 24px}
.gs-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.gs-url-input{flex:1;padding:9px 13px;border:1.5px solid var(--gray-300);border-radius:var(--r8);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--gray-50)}
.gs-url-input:focus{border-color:var(--blue);background:#fff}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:9px 20px;border-radius:var(--r8);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary:hover{background:#1976D2;box-shadow:var(--s2)}
.btn-secondary{background:#fff;color:var(--blue);border:1.5px solid var(--blue);padding:7px 16px;border-radius:var(--r8);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-secondary:hover{background:var(--blue-lt)}
.btn-ghost{background:none;border:1.5px solid var(--gray-300);color:var(--gray-600);padding:7px 12px;border-radius:var(--r8);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:none;border:1.5px solid var(--red);color:var(--red);padding:5px 10px;border-radius:var(--r8);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-danger:hover{background:var(--red-lt)}
.or-divider{text-align:center;margin:14px 0;font-size:11px;color:var(--gray-600);position:relative}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--gray-200)}
.or-divider::before{left:0}.or-divider::after{right:0}
.upload-zone{border:2px dashed var(--gray-300);border-radius:var(--r12);padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--blue);background:var(--blue-lt)}
.upload-zone-title{font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:4px}
.upload-zone-sub{font-size:11px;color:var(--gray-600);margin-bottom:12px}
.hint-box{font-size:11px;color:var(--gray-600);line-height:1.7;background:var(--gray-50);padding:12px 14px;border-radius:var(--r8);margin-bottom:12px;border-left:3px solid var(--blue-mid)}
.hint-box code{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--gray-200);padding:1px 5px;border-radius:3px;color:var(--blue)}
.code-block{background:#1E1E2E;color:#CDD6F4;border-radius:var(--r8);padding:14px;font-size:10px;font-family:'IBM Plex Mono',monospace;overflow:auto;max-height:220px;white-space:pre;line-height:1.6;margin:8px 0}
.gs-status{font-size:11px;padding:4px 0}
.gs-status.ok{color:var(--green)}.gs-status.err{color:var(--red)}.gs-status.loading{color:var(--blue)}
.prog-wrap{margin:10px 0}
.prog-track{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-mid));border-radius:3px;transition:width .4s}
.prog-label{font-size:10px;color:var(--gray-600);margin-top:4px;font-family:'IBM Plex Mono',monospace}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:10px 20px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;box-shadow:var(--s1)}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.05em}
.fs{background:var(--gray-100);border:1.5px solid var(--gray-300);border-radius:var(--r8);padding:6px 10px;font-size:12px;font-family:inherit;color:var(--gray-900);cursor:pointer;outline:none;transition:border-color .15s;min-width:90px}
.fs:focus{border-color:var(--blue)}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;align-self:flex-end}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue-lt);color:var(--blue);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500}
.chip-x{cursor:pointer;font-size:13px;opacity:.6}.chip-x:hover{opacity:1}

/* CONTENT */
.content{padding:20px;max-width:1440px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:#fff;border-radius:var(--r12);padding:18px 18px 14px;border:1px solid var(--gray-200);box-shadow:var(--s1);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--s3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--blue));border-radius:var(--r12) var(--r12) 0 0}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:24px;font-weight:700;color:var(--kc,var(--blue));font-family:'IBM Plex Mono',monospace;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--gray-600);margin-top:4px}
.kpi-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-top:6px}
.b-pass{background:var(--green-lt);color:var(--green)}.b-fail{background:var(--red-lt);color:var(--red)}.b-warn{background:var(--orange-lt);color:var(--orange)}.b-info{background:var(--blue-lt);color:var(--blue)}
.card{background:#fff;border-radius:var(--r12);border:1px solid var(--gray-200);box-shadow:var(--s1);overflow:hidden;margin-bottom:20px}
.card:hover{box-shadow:var(--s2)}
.card-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--gray-600);margin-top:1px}
.card-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--gray-100);color:var(--gray-600)}
.card-body{padding:14px 18px}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:6px}
.section-icon{width:32px;height:32px;border-radius:9px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.section-title{font-size:14px;font-weight:600}
.section-sub{font-size:11px;color:var(--gray-600);margin-top:1px}
.insight{background:linear-gradient(135deg,var(--blue-lt),rgba(2,136,209,.06));border-left:3px solid var(--blue);border-radius:0 var(--r8) var(--r8) 0;padding:9px 13px;margin-bottom:12px;font-size:12px;line-height:1.6}
.insight strong{color:var(--blue)}

/* ── TARGET LINE MANAGER ── */
.tl-manager{background:#fff;border-radius:var(--r12);border:1px solid var(--gray-200);box-shadow:var(--s1);margin-bottom:20px;overflow:hidden}
.tl-hdr{padding:12px 18px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none}
.tl-hdr-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.tl-hdr-sub{font-size:11px;color:var(--gray-600)}
.tl-toggle{font-size:12px;color:var(--gray-600);transition:transform .2s}
.tl-body{padding:14px 18px;display:none}
.tl-body.open{display:block}
.tl-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.tl-row{display:flex;align-items:center;gap:8px;background:var(--gray-50);border-radius:var(--r8);padding:8px 12px;flex-wrap:wrap}
.tl-swatch{width:20px;height:20px;border-radius:4px;border:1px solid rgba(0,0,0,.1);flex-shrink:0;cursor:pointer}
.tl-name-input{border:1.5px solid var(--gray-300);border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit;outline:none;width:110px;transition:border-color .15s;background:#fff}
.tl-name-input:focus{border-color:var(--blue)}
.tl-val-input{border:1.5px solid var(--gray-300);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;width:120px;transition:border-color .15s;background:#fff}
.tl-val-input:focus{border-color:var(--blue)}
.tl-color-input{width:34px;height:30px;border:none;background:none;padding:0;cursor:pointer;border-radius:4px;outline:none}
.tl-sel{border:1.5px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;background:#fff;cursor:pointer;outline:none;color:var(--gray-900)}
.tl-sel:focus{border-color:var(--blue)}
.tl-label-badge{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--gray-600)}
.add-line-btn{display:flex;align-items:center;gap:6px;background:var(--blue-lt);color:var(--blue);border:1.5px dashed var(--blue-mid);border-radius:var(--r8);padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;width:100%;justify-content:center;transition:all .15s;font-family:inherit}
.add-line-btn:hover{background:#BBDEFB;border-style:solid}

/* TABLE */
.tbl-scroll{overflow-x:auto;max-height:420px;overflow-y:auto}
.tbl-scroll::-webkit-scrollbar{width:5px;height:5px}.tbl-scroll::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--gray-50);color:var(--gray-600);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--gray-200);position:sticky;top:0;z-index:1;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--blue)}
thead th.sa::after{content:' ↑';color:var(--blue)}thead th.sd::after{content:' ↓';color:var(--blue)}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:hover{background:rgba(21,101,192,.04)}
tbody tr.rh td{background:rgba(198,40,40,.03)}tbody tr.rn td{background:rgba(230,81,0,.03)}
tbody td{padding:8px 12px;vertical-align:middle}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px}
.tr-right{text-align:right}
.tag{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:700;margin-left:4px}
.tag-h{background:var(--red-lt);color:var(--red)}.tag-n{background:var(--orange-lt);color:var(--orange)}.tag-ok{background:var(--green-lt);color:var(--green)}
tfoot td{background:var(--gray-50);font-weight:600;padding:9px 12px;border-top:2px solid var(--gray-200)}
.search-bar{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--gray-100)}
.search-input{flex:1;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r8);padding:7px 12px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue);background:#fff}
.search-ct{font-size:11px;color:var(--gray-600);white-space:nowrap}
.pg{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--gray-100);flex-wrap:wrap;gap:8px}
.pg-info{font-size:11px;color:var(--gray-600)}
.pg-btns{display:flex;gap:3px;flex-wrap:wrap}
.pb{background:#fff;border:1.5px solid var(--gray-200);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--gray-600);font-family:inherit;transition:all .12s;min-width:30px;text-align:center}
.pb:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}.pb.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}.pb:disabled{opacity:.35;cursor:not-allowed}
.empty{padding:60px 24px;text-align:center;color:var(--gray-600)}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4}.empty-t{font-size:16px;font-weight:600;margin-bottom:6px}.empty-s{font-size:12px}
.refresh-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:8px 20px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--gray-600)}
.last-update{font-size:11px;color:var(--gray-600);margin-left:auto;font-family:'IBM Plex Mono',monospace}

/* LOCK OVERLAY */
.lock-overlay{position:fixed;inset:0;z-index:999;background:rgba(15,23,42,.65);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lock-box{background:#fff;border-radius:20px;padding:36px 40px;text-align:center;min-width:300px;box-shadow:var(--s3)}
.lock-dots{display:flex;gap:10px;justify-content:center;margin:20px 0}
.lock-dot{width:14px;height:14px;border-radius:50%;background:var(--gray-200);transition:background .2s,transform .15s}
.lock-dot.filled{background:var(--blue);transform:scale(1.2)}
.lock-dot.error{background:var(--red);animation:shake .3s ease}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}100%{transform:translateX(0)}}
.lock-title{font-size:15px;font-weight:600;margin-bottom:6px}
.lock-sub{font-size:12px;color:var(--gray-600)}
.pin-pad{display:grid;grid-template-columns:repeat(3,56px);gap:8px;justify-content:center;margin:16px 0}
.pin-btn{width:56px;height:56px;border-radius:50%;border:1.5px solid var(--gray-200);background:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--gray-900);transition:all .12s}
.pin-btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.pin-btn:active{transform:scale(.92)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.kpi{animation:fadeUp .3s ease both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.05s}.kpi:nth-child(3){animation-delay:.08s}.kpi:nth-child(4){animation-delay:.11s}.kpi:nth-child(5){animation-delay:.14s}.kpi:nth-child(6){animation-delay:.17s}
@media(max-width:900px){.charts-2{grid-template-columns:1fr}.content{padding:14px}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr 1fr}.content{padding:10px}.tl-row{flex-wrap:wrap}}
</style>
</head>
<body>

<header class="app-bar">
  <span class="app-logo" id="appLogo" onclick="logoClick()">📊</span>
  <div style="flex:1;min-width:0">
    <div class="app-title">Loss Dashboard <span class="app-sub">Replan & Add Paper</span></div>
  </div>
  <div id="appStatus">ยังไม่มีข้อมูล</div>
</header>

<nav class="tabs">
  <div class="tab active" id="tab-rp" onclick="switchTab('rp')">🔄 Replan Loss</div>
  <div class="tab" id="tab-ap" onclick="switchTab('ap')">📄 Add Paper</div>
  <div class="tab" id="tab-cfg" onclick="switchTab('cfg')">⚙️ ตั้งค่า</div>
</nav>

<!-- ══ REPLAN ══ -->
<div class="page active" id="page-rp">
  <div id="rp-nodata"><div class="setup-wrap" id="rp-setup-nodata"></div></div>
  <div id="rp-setup" style="display:none"><div class="setup-wrap" id="rp-setup-inner"></div></div>
  <div id="rp-data" style="display:none">
    <div class="refresh-bar">
      <button class="btn-primary" style="padding:6px 14px;font-size:12px" onclick="refreshRP()">🔄 Refresh</button>
      <span id="rp-src-label"></span>
      <span class="last-update" id="rp-last-update"></span>
      <button class="btn-ghost" style="font-size:11px;padding:5px 10px" id="rp-change-src" onclick="showSetup('rp')" style="display:none">📂 เปลี่ยนแหล่งข้อมูล</button>
    </div>
    <div class="filter-bar">
      <div class="fg"><label class="fl">ปี</label><select class="fs" id="rp-fy" onchange="rpFilter()"></select></div>
      <div class="fg"><label class="fl">เดือน</label><select class="fs" id="rp-fm" onchange="rpFilter()"></select></div>
      <div class="fg"><label class="fl">Machine</label><select class="fs" id="rp-fmc" onchange="rpFilter()"></select></div>
      <div class="fg"><label class="fl">Problem</label><select class="fs" id="rp-fpb" onchange="rpFilter()"></select></div>
      <div style="display:flex;gap:6px;align-self:flex-end">
        <button class="btn-ghost" onclick="rpReset()">↺ Reset</button>
      </div>
      <div class="chip-bar" id="rp-chips"></div>
    </div>
    <div class="content" id="rp-content"></div>
  </div>
</div>

<!-- ══ ADD PAPER ══ -->
<div class="page" id="page-ap">
  <div id="ap-nodata"><div class="setup-wrap" id="ap-setup-nodata"></div></div>
  <div id="ap-setup" style="display:none"><div class="setup-wrap" id="ap-setup-inner"></div></div>
  <div id="ap-data" style="display:none">
    <div class="refresh-bar">
      <button class="btn-primary" style="padding:6px 14px;font-size:12px" onclick="refreshAP()">🔄 Refresh</button>
      <span id="ap-src-label"></span>
      <span class="last-update" id="ap-last-update"></span>
      <button class="btn-ghost" style="font-size:11px;padding:5px 10px" id="ap-change-src" onclick="showSetup('ap')" style="display:none">📂 เปลี่ยนแหล่งข้อมูล</button>
    </div>
    <div class="filter-bar">
      <div class="fg"><label class="fl">ปี</label><select class="fs" id="ap-fy" onchange="apFilter()"></select></div>
      <div class="fg"><label class="fl">เดือน</label><select class="fs" id="ap-fm" onchange="apFilter()"></select></div>
      <div class="fg"><label class="fl">แผนก</label><select class="fs" id="ap-fd" onchange="apFilter()"></select></div>
      <div class="fg"><label class="fl">โรงงาน</label><select class="fs" id="ap-ff" onchange="apFilter()"></select></div>
      <div style="display:flex;gap:6px;align-self:flex-end">

const DEFAULT_PIN = '1234';
const GS_CODE=`function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheetName = (e && e.parameter && e.parameter.sheet) || 'Replan';
  var sh = ss.getSheetByName(sheetName) || ss.getSheets()[0];
  var page = (e && e.parameter && e.parameter.page)
             ? parseInt(e.parameter.page) : 0;
  var pageSize = 5000;
  var all = sh.getDataRange().getValues();
  var headers = all[0];
  var totalRows = all.length - 1;
  var start = 1 + page * pageSize;
  var end = Math.min(start + pageSize, all.length);
  var rows = page === 0
    ? all.slice(0, Math.min(1 + pageSize, all.length))
    : all.slice(start, end);
  return ContentService
    .createTextOutput(JSON.stringify({
      data: rows, totalRows: totalRows,
      pageSize: pageSize, page: page, sheet: sheetName
    }))
    .setMimeType(ContentService.MimeType.JSON);
}`;

// Default target lines

}
function getTargetLines(k){

}

let logoClicks=0, logoTimer=null;
function logoClick(){
  const logo=document.getElementById('appLogo');

// ══════════════════════════════════════
// PIN / LOCK
// ══════════════════════════════════════
let pinBuf=[], cfgUnlocked=false;
function openLock(){
  pinBuf=[];
  updateDots('');
  document.getElementById('lockSub').textContent='กรอก PIN เพื่อเข้าหน้าตั้งค่า';
  document.getElementById('lockOverlay').style.display='flex';
}
function closeLock(){document.getElementById('lockOverlay').style.display='none';pinBuf=[];}
function pinPress(n){
  if(pinBuf.length>=4)return;
  pinBuf.push(String(n));
  updateDots('');
  if(pinBuf.length===4){
    const pin=localStorage.getItem('dash_pin')||DEFAULT_PIN;
    if(pinBuf.join('')===pin){
      cfgUnlocked=true;
      document.getElementById('tab-cfg').classList.add('unlocked');
      // show change-src buttons
      document.getElementById('rp-change-src').style.display='';
      document.getElementById('ap-change-src').style.display='';
      closeLock();
      switchTab('cfg');
    } else {
      updateDots('error');
      document.getElementById('lockSub').textContent='PIN ไม่ถูกต้อง — ลองอีกครั้ง';
      setTimeout(()=>{pinBuf=[];updateDots('');},800);
    }
  }
}
function pinClear(){if(pinBuf.length)pinBuf.pop();updateDots('');}
function updateDots(state){
  for(let i=0;i<4;i++){
    const d=document.getElementById('ld'+i);
    d.className='lock-dot'+(i<pinBuf.length?' filled':'')+(state==='error'?' error':'');
  }
}
function lockCfg(){
  cfgUnlocked=false;
  document.getElementById('tab-cfg').classList.remove('unlocked');
  document.getElementById('rp-change-src').style.display='none';
  document.getElementById('ap-change-src').style.display='none';

}

function renderTLList(k, container, lines){

      <input class="tl-name-input" value="${escHtml(ln.name)}" placeholder="ชื่อเส้น"
        oninput="updateTLField('${k}',${i},'name',this.value)" title="ชื่อ">
      <input type="number" class="tl-val-input" value="${ln.val}" placeholder="มูลค่า ฿" min="0"
        oninput="updateTLField('${k}',${i},'val',parseFloat(this.value)||0)" title="ค่า (฿)">
      <select class="tl-sel" title="รูปแบบเส้น" onchange="updateTLField('${k}',${i},'dash',this.value)">
        <option value="solid" ${ln.dash==='solid'?'selected':''}>— ทึบ</option>
        <option value="dashed" ${ln.dash==='dashed'?'selected':''}>- - ปะ</option>
        <option value="dotted" ${ln.dash==='dotted'?'selected':''}>··· จุด</option>
      </select>
      <select class="tl-sel" title="การต่อเส้น" onchange="updateTLField('${k}',${i},'tension',this.value)">
        <option value="step" ${ln.tension==='step'?'selected':''}>⌐ หักเหลี่ยม</option>
        <option value="straight" ${ln.tension==='straight'?'selected':''}>/ ตรง</option>
        <option value="smooth" ${ln.tension==='smooth'?'selected':''}>~ โค้ง</option>
      </select>
      <label class="tl-label-badge" title="แสดง/ซ่อน">
        <input type="checkbox" ${ln.show!==false?'checked':''} onchange="updateTLField('${k}',${i},'show',this.checked)"> แสดง
      </label>
      <button class="btn-danger" onclick="removeTL('${k}',${i})" title="ลบ" style="padding:4px 8px;font-size:12px">✕</button>`;
    container.appendChild(row);
  });
}

function updateTLField(k,i,field,val){
  const lines=getTargetLines(k);
  lines[i][field]=val;
  saveTargetLines(k,lines);
  refreshMonthlyChart(k);
}
function addTargetLine(k){
  const lines=getTargetLines(k);
  const palette=['#E65100','#1565C0','#2E7D32','#6A1B9A','#C62828','#00695C','#E53935','#0288D1'];
  lines.push({id:Date.now(),name:`เส้นที่ ${lines.length+1}`,val:300000,color:palette[lines.length%palette.length],dash:'dashed',tension:'step',show:true});
  saveTargetLines(k,lines);
  const cont=document.getElementById(`tl-list-${k}`);
  if(cont)renderTLList(k,cont,lines);
  refreshMonthlyChart(k);
}
function removeTL(k,i){
  const lines=getTargetLines(k);
  lines.splice(i,1);
  saveTargetLines(k,lines);
  const cont=document.getElementById(`tl-list-${k}`);
  if(cont)renderTLList(k,cont,lines);
  refreshMonthlyChart(k);
}

// ══════════════════════════════════════
// DRAG & DROP / FILE
// ══════════════════════════════════════
function dzOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function dzLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function dzDrop(e,k){e.preventDefault();dzLeave(k+'-dz');const f=e.dataTransfer.files[0];if(f)k==='rp'?parseExcelRP(f):parseExcelAP(f);}
function handleFileRP(inp){if(inp.files[0])parseExcelRP(inp.files[0]);}
function handleFileAP(inp){if(inp.files[0])parseExcelAP(inp.files[0]);}

function parseExcelRP(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const wsName=wb.SheetNames.find(n=>n.toLowerCase()==='replan')||wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:''});
      RP.all=rows.map(rpParseRow).filter(r=>r.val>0||r.jo);
      RP.src={type:'excel',name:file.name,sheet:wsName};
      localStorage.setItem('rp_src_type','excel');RP.lastUpdate=new Date();initRP();
    }catch(err){alert('❌ '+err.message);}
  };r.readAsArrayBuffer(file);
}
function parseExcelAP(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const wsName=wb.SheetNames.find(n=>n.toLowerCase()==='addpaper')||wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:''});

  };r.readAsArrayBuffer(file);
}

// ── parsers ──
function parseCause(raw){
  if(!raw)return{machine:'OTHER',problem:'OTHER'};
  const c=String(raw).split('\n')[0].trim();
  let m=c.match(/^([^-+]+?)-(.+?)\+\d+/);
  if(m)return{machine:cm(m[1]),problem:cp(m[2])};
  m=c.match(/^([^+]+)\+\d+/);
  if(m)return{machine:cm(m[1]),problem:'UNKNOWN'};
  return{machine:cm(c),problem:'OTHER'};
}
const cm=s=>String(s||'').replace(/[-_+].*$/,'').trim().toUpperCase()||'OTHER';
const cp=s=>String(s||'').replace(/\+\d+.*$/,'').trim()||'OTHER';
function getDP(d){
  if(!d)return{yr:0,mo:0};
  if(d instanceof Date&&!isNaN(d))return{yr:d.getFullYear(),mo:d.getMonth()+1};
  if(typeof d==='number'&&d>40000){const dd=new Date(Math.round((d-25569)*86400*1000));return{yr:dd.getFullYear(),mo:dd.getMonth()+1};}
  const s2=String(d),sep=s2.includes('/')?'/':(s2.includes('-')?'-':null);
  if(sep){const ps=s2.split(sep);if(ps.length>=2){const a=parseInt(ps[0]),b=parseInt(ps[1]),c=parseInt(ps[2]||0);if(a>2000)return{yr:a,mo:b};if(c>2000)return{yr:c,mo:b};if(c>0)return{yr:2000+c,mo:b};}}
  const nd=new Date(d);return isNaN(nd)?{yr:0,mo:0}:{yr:nd.getFullYear(),mo:nd.getMonth()+1};
}
const nv=v=>parseFloat(String(v).replace(/,/g,''))||0;
const sv=v=>String(v||'').trim();
const kk=(r,k)=>Object.keys(r).find(x=>x.toLowerCase().trim()===k)||Object.keys(r).find(x=>x.toLowerCase().includes(k));
function rpParseRow(r){
  const{yr,mo}=getDP(r[kk(r,'date')]||r[kk(r,'plan_date')]||'');
  const{machine,problem}=parseCause(r[kk(r,'cause')]||'');
  return{jo:sv(r['JO']||r[kk(r,'jo')]||''),compnt:sv(r[kk(r,'compnt')]||r[kk(r,'component')]||r[kk(r,'code')]||''),machine,problem,val:nv(r[kk(r,'val')]||r[kk(r,'value')]||0),check:parseInt(r[kk(r,'check')]||1)||1,yr,mo};
}
function apParseRow(r){
  const{yr,mo}=getDP(r[kk(r,'date')]||'');
  return{jo:sv(r['JO']||r[kk(r,'jo')]||''),code:sv(r[kk(r,'code')]||''),sh:nv(r[kk(r,'sh')]||0),cause:sv(r[kk(r,'cause')]||'').replace(/\s+/g,' '),dept:sv(r[kk(r,'dept')]||''),facc:sv(r[kk(r,'facc')]||''),val:nv(r[kk(r,'val')]||0),check:parseInt(r[kk(r,'check')]||1)||1,yr,mo};
}

async function loadGS(k){
  const url=(document.getElementById(`${k}-gs-url`)?.value||document.getElementById('cfg-gs-url')?.value||localStorage.getItem('gs_url')||'').trim();
  if(!url){alert('กรุณาใส่ Google Sheets URL ครับ');return;}
  localStorage.setItem('gs_url',url);
  const progEl=document.getElementById(`${k}-prog`);
  const fillEl=document.getElementById(`${k}-pfill`);
  const lblEl=document.getElementById(`${k}-plbl`);
  const stEl=document.getElementById(`${k}-gs-st`);
  const cfgSt=document.getElementById(`cfg-${k}-st`);
  const sheetName=k==='rp'?'Replan':'Addpaper';
  const setP=(p,msg)=>{if(fillEl)fillEl.style.width=p+'%';if(lblEl)lblEl.textContent=msg;};
  if(progEl)progEl.style.display='';
  if(stEl){stEl.className='gs-status loading';stEl.textContent='⏳ กำลังโหลด...';}
  if(cfgSt){cfgSt.className='gs-status loading';cfgSt.textContent=`⏳ ${k==='rp'?'RP':'AP'}...`;}
  setP(5,'เชื่อมต่อ...');
  try{
    let allRows=[],headers=[],page=0,totalRows=Infinity;
    while(allRows.length<totalRows){
      const res=await Promise.race([
        fetch(`${url}?sheet=${encodeURIComponent(sheetName)}&page=${page}`),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),25000))
      ]);
      const d=await res.json();
      const raw=d.data||[];if(!raw.length)break;
      if(page===0){headers=raw[0];totalRows=d.totalRows||raw.length-1;}
      const slice=page===0?raw.slice(1):raw;
      const parsed=slice.map(row=>{const o={};headers.forEach((h,i)=>{o[String(h)]=row[i]??'';});return o;});
      allRows=allRows.concat(parsed);
      const pct=Math.min(10+allRows.length/Math.max(totalRows,1)*80,90);
      setP(Math.round(pct),`${allRows.length.toLocaleString()} / ${totalRows.toLocaleString()} แถว`);
      if(allRows.length>=totalRows||slice.length<(d.pageSize||5000))break;
      page++;
    }
    setP(100,'✅ สำเร็จ!');
    if(k==='rp'){RP.all=allRows.map(rpParseRow).filter(r=>r.val>0||r.jo);RP.src={type:'gs',sheet:sheetName,url};RP.lastUpdate=new Date();localStorage.setItem('rp_src_type','gs');initRP();}
    else{AP.all=allRows.map(apParseRow).filter(r=>r.val>0||r.jo);AP.src={type:'gs',sheet:sheetName,url};AP.lastUpdate=new Date();localStorage.setItem('ap_src_type','gs');initAP();}
    if(stEl){stEl.className='gs-status ok';stEl.textContent=`✅ ${allRows.length.toLocaleString()} แถว`;}
    if(cfgSt){cfgSt.className='gs-status ok';cfgSt.textContent=`✅ ${k==='rp'?'RP':'AP'}: ${allRows.length.toLocaleString()}`;}
    setTimeout(()=>{if(progEl)progEl.style.display='none';},1500);
  }catch(err){
    if(progEl)progEl.style.display='none';
    if(stEl){stEl.className='gs-status err';stEl.textContent=`❌ ${err.message}`;}
    if(cfgSt){cfgSt.className='gs-status err';cfgSt.textContent=`❌ ${err.message}`;}
    alert(`โหลดไม่สำเร็จ: ${err.message}\n\n💡 ตรวจสอบ:\n• Apps Script Deploy เป็น "Anyone"\n• Sheet ชื่อ "${sheetName}" ถูกต้อง`);
  }
}

function buildTargetDatasets(k, nPts){
  const lines=getTargetLines(k);
  return lines.filter(l=>l.show!==false).map(ln=>{
    const dashArr=ln.dash==='dashed'?[8,5]:ln.dash==='dotted'?[2,4]:[];
    const tension=ln.tension==='smooth'?.4:0;
    const stepped=ln.tension==='step'?true:false;
    return{
      label:ln.name||'Target',
      data:Array(nPts).fill(ln.val),
      type:'line',
      borderColor:ln.color,
      borderWidth:2,
      borderDash:dashArr,
      pointRadius:0,
      fill:false,
      tension,
      stepped,
      yAxisID:'y',
      order:0,
    };
  });
}

  const y=document.getElementById('ap-fy').value,m=document.getElementById('ap-fm').value;
  const dp=document.getElementById('ap-fd').value,fc=document.getElementById('ap-ff').value;
  const chips=[];
  if(y)chips.push([`ปี ${y}`,"document.getElementById('ap-fy').value='';apFilter()"]);
  if(m)chips.push([MN[parseInt(m)],"document.getElementById('ap-fm').value='';apFilter()"]);
  if(dp)chips.push([`📦 ${dp}`,"document.getElementById('ap-fd').value='';apFilter()"]);
  if(fc)chips.push([`🏭 ${fc}`,"document.getElementById('ap-ff').value='';apFilter()"]);
  document.getElementById('ap-chips').innerHTML=chips.map(([l,fn])=>`<span class="chip">${l}<span class="chip-x" onclick="${fn}">×</span></span>`).join('');
}

function renderAPAll(){
  const con=document.getElementById('ap-content');
  const d=AP.fil;
  if(!d.length){con.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">ไม่พบข้อมูล</div><div class="empty-s">ลองเปลี่ยน filter</div></div>';return;}
  con.innerHTML='';

  const lines=getTargetLines('ap');
  const firstLine=lines.find(l=>l.show!==false);
  const target=firstLine?firstLine.val:0;
  const tv=d.reduce((a,r)=>a+r.val,0);
  const tSh=d.reduce((a,r)=>a+r.sh,0);
  const ni=d.filter(r=>r.check===0);
  const h5k=d.filter(r=>r.val>=5000);
  const months=[...new Set(d.filter(r=>r.yr&&r.mo).map(r=>`${r.yr}-${r.mo}`))];
  const avgMo=months.length?tv/months.length:tv;
  const pct=target?avgMo/target*100:null;
  const dg={};d.forEach(r=>{if(r.dept)dg[r.dept]=(dg[r.dept]||0)+r.val;});
  const topD=Object.entries(dg).sort((a,b)=>b[1]-a[1])[0];

  const kDiv=mkEl('div','kpi-grid');
  kDiv.innerHTML=[
    {l:'มูลค่า Add Paper รวม',v:fB(tv)+' ฿',c:'var(--purple)',sub:`avg ${fB(avgMo)} ฿/เดือน`,
     badge:pct!==null?(pct<=100?`✓ ต่ำกว่า Target ${(100-pct).toFixed(1)}%`:`⚠ เกิน Target +${(pct-100).toFixed(1)}%`):'',bc:pct!==null?(pct<=100?'b-pass':'b-fail'):''},
    {l:'จำนวนแผ่นรวม',v:fmt(tSh)+' แผ่น',c:'#1565C0',sub:`avg ${fmt(d.length?Math.round(tSh/d.length):0)} แผ่น/job`},
    {l:'จำนวน Job',v:fmt(d.length)+' งาน',c:'#0277BD',sub:`เฉลี่ย ${fB(d.length?tv/d.length:0)} ฿/งาน`},
    {l:'Job ≥ 5,000 ฿',v:fmt(h5k.length)+' งาน',c:'var(--red)',sub:`${fB(h5k.reduce((a,r)=>a+r.val,0))} ฿`,badge:d.length?`${(h5k.length/d.length*100).toFixed(1)}%`:'',bc:'b-fail'},
    {l:'ยังไม่คุยที่ประชุม',v:fmt(ni.length)+' งาน',c:'var(--orange)',sub:`${fB(ni.reduce((a,r)=>a+r.val,0))} ฿`,badge:ni.length?'ต้องนำเข้าประชุม':'ครบแล้ว',bc:ni.length?'b-warn':'b-pass'},
    {l:'แผนกใช้สูงสุด',v:topD?topD[0]:'—',c:'var(--teal)',sub:topD?`${fB(topD[1])} ฿`:'',badge:'Top Dept',bc:'b-info'},
  ].map(k=>kpiHtml(k)).join('');
  con.appendChild(kDiv);

  con.appendChild(renderTargetManager('ap'));
  toggleTLBody('ap');

  mkSH(con,'📈','Monthly Value & Dept','แนวโน้มรายเดือนพร้อม Target Lines');
  const r1=mkEl('div','charts-2');con.appendChild(r1);
  r1.appendChild(mkCard2('📅 Monthly Value (฿)',`<div style="height:250px"><canvas id="apMonthly"></canvas></div>`));
  r1.appendChild(mkCard2('🏭 Value by Dept',`<div style="height:250px"><canvas id="apDept"></canvas></div>`));

  mkSH(con,'📊','Pareto Analysis','สาเหตุ');
  const r2=mkEl('div','charts-2');con.appendChild(r2);
  r2.appendChild(mkCard2('⚠ Pareto — สาเหตุ vs มูลค่า',`<div id="ap-pi1" class="insight" style="display:none"></div><div style="height:260px"><canvas id="apPareto1"></canvas></div>`));
  r2.appendChild(mkCard2('🔢 Pareto — สาเหตุ vs ครั้ง',`<div id="ap-pi2" class="insight" style="display:none"></div><div style="height:260px"><canvas id="apPareto2"></canvas></div>`));

  mkSH(con,'🏆','Product Ranking','Top 15');
  const prC=mkCard('📦 Top 15 Products','ตามมูลค่า','ap-pr-badge');prC.querySelector('.card-body').innerHTML='<div style="height:320px"><canvas id="apProduct"></canvas></div>';con.appendChild(prC);

  mkSH(con,'📋','รายละเอียด',`${AP.fil.length.toLocaleString()} รายการ`,'ap-tbl-sub');
  const tC=mkCard('รายการทั้งหมด','');tC.querySelector('.card-body').remove();
  tC.innerHTML+=`
    <div class="search-bar">
      <input type="text" class="search-input" id="ap-search" placeholder="🔍 ค้นหา JO, Code, สาเหตุ, แผนก..." oninput="apSrch()">
      <div class="search-ct" id="ap-sct"></div>
    </div>
    <div class="tbl-scroll"><table>
      <thead><tr>
        <th onclick="apSortBy('jo')">JO</th><th onclick="apSortBy('code')">Code</th>
        <th onclick="apSortBy('cause')">สาเหตุ</th><th onclick="apSortBy('dept')">Dept</th>
        <th onclick="apSortBy('facc')">Factory</th><th onclick="apSortBy('mo')">เดือน</th>
        <th onclick="apSortBy('val')" class="sd">มูลค่า (฿)</th><th>สถานะ</th>
      </tr></thead>
      <tbody id="ap-tbody"></tbody>
      <tfoot><tr id="ap-tfoot"></tr></tfoot>
    </table></div>
    <div class="pg" id="ap-pg"></div>`;
  con.appendChild(tC);

  requestAnimationFrame(()=>{buildAPCharts(d);apRenderTable();});
}

function buildAPCharts(d){
  const mo={};d.forEach(r=>{if(r.yr&&r.mo){const k2=`${r.yr}-${String(r.mo).padStart(2,'0')}`;mo[k2]=(mo[k2]||0)+r.val;}});
  const mK=Object.keys(mo).sort(),mV=mK.map(k2=>mo[k2]);
  const mL=mK.map(k2=>{const[y,m]=k2.split('-');return`${MN[parseInt(m)]}'${y.slice(2)}`;});
  const tl=buildTargetDatasets('ap',mK.length);
  dc('apM');
  const ds=[{label:'฿',data:mV,backgroundColor:mV.map(v=>{const ov=tl.filter(l=>v>l.data[0]);return ov.length?'rgba(198,40,40,.82)':'rgba(106,27,154,.82)';}),borderRadius:5,order:2},...tl];
  charts['apM']=new Chart(document.getElementById('apMonthly'),{type:'bar',data:{labels:mL,datasets:ds},options:moChartOpts()});

  const dg={};d.forEach(r=>{if(r.dept)dg[r.dept]=(dg[r.dept]||0)+r.val;});
  const dS=Object.entries(dg).sort((a,b)=>b[1]-a[1]);
  dc('apD');charts['apD']=new Chart(document.getElementById('apDept'),{type:'bar',data:{labels:dS.map(x=>x[0]),datasets:[{data:dS.map(x=>x[1]),backgroundColor:C_PURPLE.slice(0,dS.length),borderRadius:4}]},options:hChartOpts()});

  const cg={};d.forEach(r=>{if(r.cause){const k2=r.cause.toLowerCase().replace(/\s+/g,' ');cg[k2]=(cg[k2]||0)+r.val;}});
  buildPareto('apPareto1','ap-pi1',cg);
  const cc={};d.forEach(r=>{if(r.cause){const k2=r.cause.toLowerCase().replace(/\s+/g,' ');cc[k2]=(cc[k2]||0)+1;}});
  buildPareto('apPareto2','ap-pi2',cc);

  const pG={};d.forEach(r=>{if(r.code)pG[r.code]=(pG[r.code]||0)+r.val;});
  const pS=Object.entries(pG).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const pb=document.getElementById('ap-pr-badge');if(pb)pb.textContent=`Top ${pS.length}`;
  dc('apProd');charts['apProd']=new Chart(document.getElementById('apProduct'),{type:'bar',data:{labels:pS.map(x=>x[0].length>30?x[0].slice(0,29)+'…':x[0]),datasets:[{data:pS.map(x=>x[1]),backgroundColor:pS.map((_,i)=>`hsla(${270+i*10},55%,${52-i*1.5}%,.85)`),borderRadius:4}]},options:{...hChartOpts(),layout:{padding:{right:70}}}});
}

// ── Shared chart opts ──
function moChartOpts(){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:9},boxWidth:14,usePointStyle:true}},tooltip:{callbacks:{label:c=>{if(c.dataset.type==='line')return` ${c.dataset.label}: ${fB(c.parsed.y)} ฿`;return` ${fB(c.parsed.y)} ฿`;}}}},
    scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.06)'}}},
    animation:{onComplete(ctx){lblBarsV(ctx.chart);}}};
}
function hChartOpts(){
  return{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fB(c.parsed.x)} ฿`}}},
    scales:{x:{ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{font:{size:10}},grid:{display:false}}},
    animation:{onComplete(ctx){lblBarsH(ctx.chart);}}};
}
function lblBarsV(ch){const c=ch.ctx;c.save();c.font='bold 8px IBM Plex Mono';c.textAlign='center';c.fillStyle='#333';ch.data.datasets[0].data.forEach((v,i)=>{const mm=ch.getDatasetMeta(0);if(mm.data[i]){const b=mm.data[i].getProps(['x','y'],true);c.fillText(fB(v),b.x,b.y-5);}});c.restore();}
function lblBarsH(ch){const c=ch.ctx;c.save();c.font='8px IBM Plex Mono';c.fillStyle='#333';c.textAlign='left';ch.data.datasets[0].data.forEach((v,i)=>{const mm=ch.getDatasetMeta(0);if(mm.data[i]){const b=mm.data[i].getProps(['x','y'],true);c.fillText(fB(v),b.x+4,b.y+4);}});c.restore();}

function buildPareto(canvasId,insightId,grpObj){
  const sorted=Object.entries(grpObj).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const total=sorted.reduce((a,[,v])=>a+v,0);if(!total)return;
  let cum=0;const cp=sorted.map(([,v])=>{cum+=v;return+(cum/total*100).toFixed(1);});
  let n80=0,v80=0;for(const[,v] of sorted){n80++;v80+=v;if(v80/total>=0.8)break;}
  const el2=document.getElementById(insightId);
  if(el2){el2.style.display='block';el2.innerHTML=`💡 <strong>${n80} รายการแรก</strong> คิดเป็น <strong>${Math.round(v80/total*100)}%</strong>${sorted[0]?` — "${sorted[0][0]}" สูงสุด <strong>${fB(sorted[0][1])}</strong>`:''}`;};
  dc(canvasId);
  charts[canvasId]=new Chart(document.getElementById(canvasId),{type:'bar',data:{labels:sorted.map(([k])=>k.length>16?k.slice(0,15)+'…':k),datasets:[{label:'มูลค่า',data:sorted.map(([,v])=>v),backgroundColor:C_WARN.slice(0,sorted.length),borderRadius:3,yAxisID:'y'},{label:'%สะสม',data:cp,type:'line',borderColor:'#1565C0',borderWidth:2,pointRadius:3,pointBackgroundColor:'#1565C0',fill:false,yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:9},boxWidth:12}},tooltip:{callbacks:{label:c=>c.datasetIndex===0?` ${fmt(c.parsed.y)}`:` ${c.parsed.y}%`}}},scales:{x:{ticks:{font:{size:8},maxRotation:35},grid:{display:false}},y:{position:'left',ticks:{callback:v=>fB(v),font:{size:9}},grid:{color:'rgba(0,0,0,.06)'}},y2:{position:'right',min:0,max:100,ticks:{callback:v=>v+'%',font:{size:9},color:'#1565C0'},grid:{display:false}}}}});
}

// ── TABLE ──
function rpSrch(){RP.search=document.getElementById('rp-search').value.toLowerCase();RP.pg=0;rpRenderTable();}
function rpSortBy(c){if(RP.sort.c===c)RP.sort.d*=-1;else{RP.sort.c=c;RP.sort.d=-1;}rpRenderTable();}
function rpRenderTable(){
  let data=RP.fil.filter(r=>!RP.search||[r.jo,r.compnt,r.machine,r.problem].join(' ').toLowerCase().includes(RP.search));
  data=[...data].sort((a,b)=>{const va=a[RP.sort.c],vb=b[RP.sort.c];return(typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''),'th'))*RP.sort.d;});
  const tot=data.length,pages=Math.ceil(tot/PAGE)||1;RP.pg=Math.min(RP.pg,pages-1);
  const sl=data.slice(RP.pg*PAGE,(RP.pg+1)*PAGE);
  const sub=document.getElementById('rp-tbl-sub');if(sub)sub.textContent=`${RP.fil.length.toLocaleString()} รายการ`;
  const sct=document.getElementById('rp-sct');if(sct)sct.textContent=RP.search?`พบ ${tot.toLocaleString()}/${RP.fil.length.toLocaleString()}`:tot.toLocaleString()+' รายการ';
  const tb=document.getElementById('rp-tbody');if(!tb)return;
  tb.innerHTML=sl.map(r=>`<tr class="${r.val>=5000?'rh':''} ${r.check===0?'rn':''}">
    <td class="mono">${r.jo}</td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.compnt}">${r.compnt}</td>
    <td><strong>${r.machine}</strong></td>
    <td style="color:${r.problem==='COLOR'?'#C62828':r.problem==='SCUM'?'#E65100':'inherit'}">${r.problem}</td>
    <td style="white-space:nowrap">${MN[r.mo]||''} ${r.yr}</td>
    <td class="tr-right mono" style="color:${r.val>=5000?'var(--red)':'var(--blue)'}">${fmt(r.val)}${r.val>=5000?'<span class="tag tag-h">HIGH</span>':''}</td>
    <td>${r.check===0?'<span class="tag tag-n">ยังไม่คุย</span>':'<span class="tag tag-ok">✓ คุยแล้ว</span>'}</td>
  </tr>`).join('');
  const tv=data.reduce((a,r)=>a+r.val,0);
  const tf=document.getElementById('rp-tfoot');if(tf)tf.innerHTML=`<td colspan="5">รวม ${data.length.toLocaleString()}</td><td class="tr-right mono">${fmt(tv)}</td><td></td>`;
  renderPg('rp-pg',RP.pg,pages,tot,p=>{RP.pg=p;rpRenderTable();});
}
function apSrch(){AP.search=document.getElementById('ap-search').value.toLowerCase();AP.pg=0;apRenderTable();}
function apSortBy(c){if(AP.sort.c===c)AP.sort.d*=-1;else{AP.sort.c=c;AP.sort.d=-1;}apRenderTable();}
function apRenderTable(){
  let data=AP.fil.filter(r=>!AP.search||[r.jo,r.code,r.cause,r.dept,r.facc].join(' ').toLowerCase().includes(AP.search));
  data=[...data].sort((a,b)=>{const va=a[AP.sort.c],vb=b[AP.sort.c];return(typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''),'th'))*AP.sort.d;});
  const tot=data.length,pages=Math.ceil(tot/PAGE)||1;AP.pg=Math.min(AP.pg,pages-1);
  const sl=data.slice(AP.pg*PAGE,(AP.pg+1)*PAGE);
  const sub=document.getElementById('ap-tbl-sub');if(sub)sub.textContent=`${AP.fil.length.toLocaleString()} รายการ`;
  const sct=document.getElementById('ap-sct');if(sct)sct.textContent=AP.search?`พบ ${tot.toLocaleString()}/${AP.fil.length.toLocaleString()}`:tot.toLocaleString()+' รายการ';
  const tb=document.getElementById('ap-tbody');if(!tb)return;
  tb.innerHTML=sl.map(r=>`<tr class="${r.val>=5000?'rh':''} ${r.check===0?'rn':''}">
    <td class="mono">${r.jo}</td>
    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.code}">${r.code}</td>
    <td>${r.cause}</td><td><strong>${r.dept}</strong></td><td>${r.facc}</td>
    <td style="white-space:nowrap">${MN[r.mo]||''} ${r.yr}</td>
    <td class="tr-right mono" style="color:${r.val>=5000?'var(--red)':'var(--purple)'}">${fmt(r.val)}${r.val>=5000?'<span class="tag tag-h">HIGH</span>':''}</td>
    <td>${r.check===0?'<span class="tag tag-n">ยังไม่คุย</span>':'<span class="tag tag-ok">✓ คุยแล้ว</span>'}</td>
  </tr>`).join('');
  const tv=data.reduce((a,r)=>a+r.val,0);
  const tf=document.getElementById('ap-tfoot');if(tf)tf.innerHTML=`<td colspan="6">รวม ${data.length.toLocaleString()}</td><td class="tr-right mono">${fmt(tv)}</td><td></td>`;
  renderPg('ap-pg',AP.pg,pages,tot,p=>{AP.pg=p;apRenderTable();});
}

// ── helpers ──
function kpiHtml(k){return`<div class="kpi" style="--kc:${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.sub||''}</div>${k.badge?`<span class="kpi-badge ${k.bc}">${k.badge}</span>`:''}</div>`;}
function mkEl(tag,cls){const e=document.createElement(tag);e.className=cls;return e;}
function mkCard(title,sub,badgeId){
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-hdr"><div><div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:''}</div>${badgeId?`<span class="card-badge" id="${badgeId}">—</span>`:''}</div><div class="card-body"></div>`;
  return c;
}
function mkCard2(title,bodyHtml){
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-hdr"><div class="card-title">${title}</div></div><div class="card-body">${bodyHtml}</div>`;return c;
}
function mkSH(con,icon,title,sub,subId){
  const d=document.createElement('div');d.className='section-hdr';
  d.innerHTML=`<div class="section-icon">${icon}</div><div><div class="section-title">${title}</div><div class="section-sub"${subId?` id="${subId}"`:''} >${sub}</div></div>`;
  con.appendChild(d);
}
function renderPg(id,pg,pages,total,cb){
  const el2=document.getElementById(id);if(!el2)return;
  if(pages<=1){el2.innerHTML='';return;}
  const s2=pg*PAGE+1,e2=Math.min((pg+1)*PAGE,total);
  const show=new Set([0,pg-1,pg,pg+1,pages-1].filter(x=>x>=0&&x<pages));
  let btns='',prev=-1;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(prev>=0&&p>prev+1)btns+=`<span style="padding:0 4px;color:var(--gray-600)">…</span>`;
    btns+=`<button class="pb${p===pg?' on':''}" onclick="(${cb.toString()})(${p})">${p+1}</button>`;prev=p;
  });
  el2.innerHTML=`<div class="pg-info">${s2.toLocaleString()}–${e2.toLocaleString()} จาก ${total.toLocaleString()}</div><div class="pg-btns"><button class="pb" ${pg===0?'disabled':''} onclick="(${cb.toString()})(${pg-1})">‹</button>${btns}<button class="pb" ${pg===pages-1?'disabled':''} onclick="(${cb.toString()})(${pg+1})">›</button></div>`;
}
